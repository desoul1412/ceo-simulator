<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Cyborg worker — top-down view, 32x32 placeholder (single frame) -->
  <!-- Shadow -->
  <ellipse cx="16" cy="28" rx="8" ry="3" fill="rgba(0,0,0,0.4)"/>
  <!-- Body -->
  <rect x="10" y="14" width="12" height="12" fill="#1a2a4a"/>
  <rect x="10" y="14" width="12" height="12" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.7"/>
  <!-- Chest circuit line -->
  <line x1="13" y1="18" x2="19" y2="18" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
  <rect x="15" y="16" width="2" height="2" fill="#00ffff" opacity="0.7"/>
  <!-- Head (top-down: circle/square) -->
  <rect x="12" y="6" width="8" height="8" fill="#1e3560"/>
  <rect x="12" y="6" width="8" height="8" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
  <!-- Eyes (glowing dots) -->
  <rect x="13" y="8" width="2" height="2" fill="#00ffff"/>
  <rect x="17" y="8" width="2" height="2" fill="#00ffff"/>
  <!-- Arms -->
  <rect x="6" y="15" width="4" height="3" fill="#162040"/>
  <rect x="22" y="15" width="4" height="3" fill="#162040"/>
  <!-- Legs -->
  <rect x="11" y="26" width="4" height="4" fill="#162040"/>
  <rect x="17" y="26" width="4" height="4" fill="#162040"/>
</svg>
