<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Dark sci-fi server room floor tile -->
  <rect width="32" height="32" fill="#0d1117"/>
  <!-- Grid lines -->
  <line x1="0" y1="0" x2="32" y2="0" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="0" x2="0" y2="32" stroke="#161b22" stroke-width="1"/>
  <!-- Circuit trace horizontal -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#1a2535" stroke-width="1"/>
  <!-- Circuit trace vertical -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#1a2535" stroke-width="1"/>
  <!-- Corner nodes -->
  <rect x="14" y="14" width="4" height="4" fill="#1e2d45"/>
  <!-- Small circuit dots -->
  <rect x="6" y="15" width="2" height="2" fill="#243040"/>
  <rect x="24" y="15" width="2" height="2" fill="#243040"/>
  <rect x="15" y="6" width="2" height="2" fill="#243040"/>
  <rect x="15" y="24" width="2" height="2" fill="#243040"/>
  <!-- Subtle glow dot center -->
  <rect x="15" y="15" width="2" height="2" fill="#1e3a5f"/>
</svg>
