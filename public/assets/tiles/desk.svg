<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Cyberpunk computer desk top-down -->
  <!-- Desk surface -->
  <rect width="32" height="32" fill="#0d1117"/>
  <!-- Desk body -->
  <rect x="2" y="4" width="28" height="22" fill="#111c3a"/>
  <rect x="2" y="4" width="28" height="22" fill="none" stroke="#1e3060" stroke-width="1"/>
  <!-- Monitor (top-down, thin rectangle) -->
  <rect x="6" y="6" width="20" height="10" fill="#050d1a"/>
  <rect x="6" y="6" width="20" height="10" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.6"/>
  <!-- Screen content glow lines -->
  <line x1="8" y1="9" x2="24" y2="9" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  <line x1="8" y1="12" x2="20" y2="12" stroke="#00ff88" stroke-width="1" opacity="0.25"/>
  <!-- Keyboard -->
  <rect x="8" y="19" width="14" height="5" fill="#0a1428"/>
  <rect x="8" y="19" width="14" height="5" fill="none" stroke="#1e3060" stroke-width="1"/>
  <!-- Key rows -->
  <line x1="10" y1="21" x2="20" y2="21" stroke="#1a2a4a" stroke-width="1"/>
  <line x1="10" y1="23" x2="20" y2="23" stroke="#1a2a4a" stroke-width="1"/>
  <!-- Mouse -->
  <rect x="24" y="19" width="5" height="7" rx="1" fill="#0a1428"/>
  <rect x="24" y="19" width="5" height="7" fill="none" stroke="#1e3060" stroke-width="1"/>
  <line x1="26" y1="19" x2="26" y2="26" stroke="#1e3060" stroke-width="1"/>
</svg>
